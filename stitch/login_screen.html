<html class="dark"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "primary-container": "#00e3fd",
                  "surface-container": "#161a21",
                  "tertiary-dim": "#5c9ffc",
                  "surface-container-lowest": "#000000",
                  "on-primary-fixed": "#003840",
                  "background": "#0b0e14",
                  "tertiary-container": "#599cf9",
                  "surface-container-highest": "#22262f",
                  "primary": "#81ecff",
                  "error-dim": "#d7383b",
                  "on-primary-fixed-variant": "#005762",
                  "secondary-container": "#591adc",
                  "secondary-fixed": "#d8caff",
                  "on-tertiary-container": "#001d3f",
                  "primary-fixed-dim": "#00d4ec",
                  "surface": "#0b0e14",
                  "on-secondary": "#25006b",
                  "secondary": "#a68cff",
                  "outline-variant": "#45484f",
                  "surface-container-low": "#10131a",
                  "secondary-fixed-dim": "#cabaff",
                  "surface-variant": "#22262f",
                  "tertiary-fixed-dim": "#65a4ff",
                  "on-surface-variant": "#a9abb3",
                  "on-secondary-fixed-variant": "#591bdc",
                  "on-error": "#490006",
                  "tertiary": "#70aaff",
                  "surface-dim": "#0b0e14",
                  "inverse-primary": "#006976",
                  "on-tertiary": "#002a55",
                  "on-tertiary-fixed": "#001835",
                  "outline": "#73757d",
                  "on-secondary-container": "#e4daff",
                  "on-primary": "#005762",
                  "surface-bright": "#282c36",
                  "on-background": "#ecedf6",
                  "error": "#ff716c",
                  "on-tertiary-fixed-variant": "#003971",
                  "tertiary-fixed": "#80b2ff",
                  "surface-container-high": "#1c2028",
                  "primary-dim": "#00d4ec",
                  "surface-tint": "#81ecff",
                  "inverse-surface": "#f9f9ff",
                  "on-primary-container": "#004d57",
                  "on-secondary-fixed": "#3b00a0",
                  "secondary-dim": "#7e51ff",
                  "on-surface": "#ecedf6",
                  "inverse-on-surface": "#52555c",
                  "on-error-container": "#ffa8a3",
                  "error-container": "#9f0519",
                  "primary-fixed": "#00e3fd"
          },
          "borderRadius": {
                  "DEFAULT": "1rem",
                  "lg": "2rem",
                  "xl": "3rem",
                  "full": "9999px"
          },
          "fontFamily": {
                  "headline": ["Plus Jakarta Sans"],
                  "display": ["Plus Jakarta Sans"],
                  "body": ["Inter"],
                  "label": ["Inter"]
          }
        },
      },
    }
  </script>
<style>
    body {
      background-color: #0b0e14;
      font-family: 'Inter', sans-serif;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .bg-electric-glow {
      background: radial-gradient(circle at 20% 30%, rgba(129, 236, 255, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(166, 140, 255, 0.15) 0%, transparent 50%);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col relative overflow-hidden">
<!-- Ambient Cinematic Background Effects -->
<div class="absolute inset-0 pointer-events-none bg-electric-glow z-0"></div>
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/20 blur-[120px] rounded-full z-0"></div>
<div class="absolute -bottom-24 -right-24 w-[32rem] h-[32rem] bg-secondary/15 blur-[160px] rounded-full z-0"></div>
<!-- Onboarding Progress Pillars (Brand Signature) -->
<div class="fixed top-0 left-0 w-full flex gap-2 p-4 z-50">
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-surface-container-highest rounded-full"></div>
<div class="h-1 flex-1 bg-surface-container-highest rounded-full"></div>
</div>
<main class="flex-grow flex items-center justify-center p-6 z-10 relative">
<!-- Glassmorphic Login Card -->
<div class="w-full max-w-md bg-surface-container-low/60 backdrop-blur-[40px] rounded-lg p-10 flex flex-col gap-8 shadow-[0_32px_64px_rgba(0,0,0,0.4)]">
<!-- Brand Header -->
<div class="space-y-2">
<div class="flex items-center gap-2 mb-6">
<div class="w-10 h-10 bg-gradient-to-br from-primary to-primary-container rounded-lg flex items-center justify-center rotate-3">
<span class="material-symbols-outlined text-on-primary-fixed font-bold">bolt</span>
</div>
<span class="text-2xl font-black text-primary italic tracking-tighter font-headline">LiveBox</span>
</div>
<h1 class="text-4xl font-bold font-display tracking-tight text-on-surface">Welcome back!</h1>
<p class="text-on-surface-variant font-body">Ignite your session to continue.</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-6">
<div class="space-y-4">
<!-- Email Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input class="w-full h-14 pl-14 pr-6 bg-surface-container-high rounded-lg text-on-surface placeholder:text-outline border-none focus:ring-0 focus:bg-surface-bright transition-all duration-300" placeholder="Email" type="email"/>
<div class="absolute inset-0 rounded-lg pointer-events-none opacity-0 group-focus-within:opacity-100 transition-opacity duration-300 shadow-[0_0_15px_rgba(129,236,255,0.2)] ring-1 ring-primary/20"></div>
</div>
<!-- Password Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="w-full h-14 pl-14 pr-12 bg-surface-container-high rounded-lg text-on-surface placeholder:text-outline border-none focus:ring-0 focus:bg-surface-bright transition-all duration-300" placeholder="Password" type="password"/>
<div class="absolute inset-y-0 right-4 flex items-center">
<button class="text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<div class="absolute inset-0 rounded-lg pointer-events-none opacity-0 group-focus-within:opacity-100 transition-opacity duration-300 shadow-[0_0_15px_rgba(129,236,255,0.2)] ring-1 ring-primary/20"></div>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-4">
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-container text-on-primary-fixed font-bold rounded-full text-lg shadow-[0_10px_25px_rgba(0,227,253,0.3)] hover:scale-[1.02] active:scale-95 transition-all duration-200" type="submit">
            Login
          </button>
<div class="flex justify-center">
<a class="text-sm font-medium text-secondary hover:text-secondary-fixed transition-colors tracking-wide" href="#">
              Forgot your password?
            </a>
</div>
</div>
</form>
<!-- Bottom Separator (Tonal Shift) -->
<div class="h-px w-full bg-surface-container-highest"></div>
<!-- Registration Link -->
<div class="text-center">
<p class="text-on-surface-variant text-sm font-body">
          Need an account? 
          <a class="text-secondary font-semibold hover:underline ml-1" href="#">Register</a>
</p>
</div>
</div>
</main>
<!-- Decorative Corner Graphics -->
<div class="fixed bottom-10 left-10 opacity-20 pointer-events-none">
<div class="grid grid-cols-4 gap-2">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-secondary"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
</div>
</div>
<!-- Note: Navigation shell suppressed for transactional screen per "Shared Components Logic" rules -->
</body></html>
