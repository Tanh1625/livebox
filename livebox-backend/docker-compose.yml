version: '3.8'

services:
  # ── Backend Application ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: livebox_api
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/livebox
      - DB_USERNAME=livebox_user
      - DB_PASSWORD=livebox_pass
      - JWT_SECRET_KEY=YmFzZTY0LWVuY29kZWQtc2VjcmV0LWtleS1tdXN0LWJlLWF0LWxlYXN0LTI1Ni1iaXRz
      - JWT_ACCESS_EXPIRY_MS=3600000
      - JWT_REFRESH_EXPIRY_MS=604800000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - livebox_net
    restart: unless-stopped

  # ── PostgreSQL Database ─────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: livebox_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=livebox
      - POSTGRES_USER=livebox_user
      - POSTGRES_PASSWORD=livebox_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livebox_user -d livebox"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - livebox_net
    restart: unless-stopped

volumes:
  pgdata:
    name: livebox_pgdata

networks:
  livebox_net:
    name: livebox_net
    driver: bridge
