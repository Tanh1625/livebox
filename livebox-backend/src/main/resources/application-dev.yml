spring:
  config:
    activate:
      on-profile: dev

  # ── DataSource configuration is inherited from application.yml ──────────────

  # ── JPA / Hibernate (verbose for development) ────────────────────────────────
  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  # ── Flyway (allow destructive clean in dev only) ─────────────────────────────
  flyway:
    clean-disabled: false         # Permitted in dev; NEVER set false in prod

# ── Logging (verbose for development) ────────────────────────────────────────
logging:
  level:
    root: INFO
    com.livebox: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.socket: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# ── Custom Application Properties ──────────────────────────────────────────────
livebox:
  jwt:
    # Use a secure randomly generated base64 256-bit key in production
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: ${JWT_EXPIRATION:3600000} # 1 hour in ms
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days in ms

livekit:
  url: ${LIVEKIT_URL:wss://livebox-dev.livekit.cloud}
  api-key: ${LIVEKIT_API_KEY:dev-api-key}
  api-secret: ${LIVEKIT_API_SECRET:dev-api-secret}
