server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: livebox-backend

  # ── DataSource ──────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none          # Flyway owns the schema; Hibernate only validates
    open-in-view: false           # Disable OSIV — avoids lazy-load pitfalls in controllers
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        show_sql: false

  # ── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true          # Safety: disallow destructive clean in production

  # ── Security (JWT) ─ never hardcode real secrets here ─────────────────────
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:change-me-in-production-must-be-at-least-256-bits}
      access-token-expiration-ms: ${JWT_ACCESS_EXPIRY_MS:3600000}        # 1 hour
      refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}    # 7 days

  # ── Jackson ─────────────────────────────────────────────────────────────────
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false

  # ── File Upload ─────────────────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 2MB          # C05 – avatar ≤ 2 MB
      max-request-size: 2MB

# ── Logging (base) ──────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.livebox: INFO

# ── SpringDoc / Swagger UI ────────────────────────────────────────────────────
springdoc:
  swagger-ui:
#    persistAuthorization: true        # Lưu token trong localStorage, không mất khi refresh trang
    operationsSorter: method          # Sắp xếp các endpoint theo HTTP method
    tagsSorter: alpha                 # Sắp xếp các tag theo bảng chữ cái
    displayRequestDuration: true      # Hiển thị thời gian thực thi request

# ── LiveKit ───────────────────────────────────────────────────────────────────
livekit:
  url: ${LIVEKIT_URL}
  api-key: ${LIVEKIT_API_KEY}
  api-secret: ${LIVEKIT_API_SECRET}

cloudinary:
  url: ${CLOUDINARY_URL}

# ── Custom LiveBox Config ─────────────────────────────────────────────────────
livebox:
  cookie:
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAME_SITE:Lax}
  jwt:
    refresh-expiration: ${JWT_REFRESH_EXPIRY_MS:604800000}
