<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveBox Tester v3.2 - Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
  <style>
    :root {
      --bg-dark: #0e1117;
      --bg-card: #161b22;
      --accent: #7c83f5;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --success: #238636;
      --danger: #da3633;
      --sidebar-w: 240px;
      --right-w: 300px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg-dark);color:var(--text);overflow:hidden;height:100vh;font-size:14px}
    
    /* Layout */
    .app-container { 
      display: grid; 
      grid-template-columns: var(--sidebar-w) 1fr var(--right-w); 
      height: 100vh; 
      max-width: 100%;
      margin: 0 auto;
    }
    
    @media (max-width: 1200px) {
      .app-container { grid-template-columns: 200px 1fr 250px; }
      :root { --sidebar-w: 200px; --right-w: 250px; }
    }

    @media (max-width: 900px) {
      .app-container { grid-template-columns: 60px 1fr 0px; }
      .right-panel { display: none; }
      .sidebar h1, .sidebar .nav-item span:not(.icon), .section-title { display: none; }
      .sidebar-header { justify-content: center; padding: 10px 0; }
      .logout-btn { font-size: 8px; padding: 2px 4px; }
    }

    /* Sidebar */
    .sidebar { background: #010409; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .sidebar-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .sidebar-header h1 { font-size: 14px; color: var(--accent); font-weight: 800; letter-spacing: 1px; }
    .scroll-area { flex: 1; overflow-y: auto; padding: 8px; }
    .section-title { font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; margin: 12px 8px 6px; }
    
    /* List items */
    .nav-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-bottom: 2px; color: var(--text-dim); transition: 0.2s; }
    .nav-item:hover { background: #1f2328; color: var(--text); }
    .nav-item.active { background: #1f2328; color: var(--accent); font-weight: 600; }
    .nav-item .icon { width: 20px; height: 20px; border-radius: 4px; background: var(--border); display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; font-size: 11px; }
    
    /* Main Content (Chat) */
    .main-content { display: flex; flex-direction: column; background: var(--bg-dark); min-width: 0; }
    .main-header { height: 48px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; }
    .main-header h2 { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    #msgList { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    #msgList::-webkit-scrollbar { width: 6px; }
    #msgList::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    
    .msg { display: flex; gap: 10px; animation: fadeIn 0.2s; max-width: 80%; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
    .msg-av { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }
    .msg-body { flex: 1; min-width: 0; }
    .msg-meta { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; }
    .msg-meta strong { color: var(--text); margin-right: 6px; font-size: 12px; }
    .msg-content { font-size: 13px; line-height: 1.4; color: #d1d5db; word-break: break-word; background: #1f2328; padding: 6px 10px; border-radius: 0 10px 10px 10px; border: 1px solid var(--border); }
    
    /* Self messages */
    .msg.self { align-self: flex-end; flex-direction: row-reverse; }
    .msg.self .msg-content { background: #23416b; border-color: #388bfd; border-radius: 10px 0 10px 10px; }
    .msg.self .msg-meta { text-align: right; }
    .msg.self .msg-meta strong { margin-right: 0; margin-left: 6px; }
    
    .msg-system { text-align: center; color: var(--text-dim); font-size: 11px; font-style: italic; margin: 8px 0; }
    
    .chat-input-area { padding: 0 16px 16px; }
    .input-box { background: #1f2328; border: 1px solid var(--border); border-radius: 8px; padding: 8px; display: flex; gap: 8px; align-items: center; }
    .input-box textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text); resize: none; height: 20px; font-size: 13px; font-family: inherit; line-height: 20px; }
    .input-box button { background: var(--accent); color: white; border: none; padding: 4px 10px; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 12px; }
    .input-box button:disabled { opacity: 0.5; }
    
    /* Right Panel (Controls) */
    .right-panel { background: var(--bg-card); border-left: 1px solid var(--border); overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
    .card { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
    .card h3 { font-size: 10px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    
    input, select { width: 100%; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 4px; padding: 5px 8px; color: var(--text); font-size: 12px; margin-bottom: 6px; outline: none; }
    button.btn { width: 100%; padding: 6px; border-radius: 4px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; margin-top: 2px; transition: 0.2s; }
    .btn-p { background: var(--accent); color: white; }
    .btn-g { background: var(--success); color: white; }
    .btn-r { background: var(--danger); color: white; }
    
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #484f58; margin-right: 4px; }
    .status-dot.on { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
    
    .log-box { font-family: monospace; font-size: 10px; height: 80px; overflow-y: auto; background: black; color: #8b949e; padding: 6px; border-radius: 4px; margin-top: 6px; }
    .json-box { font-family: monospace; font-size: 10px; background: #010409; color: #7ee787; padding: 6px; border-radius: 4px; white-space: pre-wrap; overflow-x: auto; max-height: 150px; }

    /* Presence */
    .member-item { display: flex; align-items: center; gap: 8px; padding: 4px 6px; border-radius: 6px; font-size: 12px; }
    .m-av { position: relative; }
    .p-dot { position: absolute; bottom: -1px; right: -1px; width: 8px; height: 8px; border-radius: 50%; border: 2px solid var(--bg-card); background: #484f58; }
    .p-dot.online { background: #3fb950; }

    #loadingMore { text-align: center; font-size: 10px; color: var(--text-dim); display: none; padding: 8px; }
    .logout-btn { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 1px 6px; border-radius: 4px; font-size: 9px; cursor: pointer; }
    .logout-btn:hover { background: var(--danger); color: white; }
  </style>
</head>
<body>

<div class="app-container">
  
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>LIVEBOX</h1>
      <button id="btnLogout" class="logout-btn" style="display:none" onclick="doLogout()">Logout</button>
    </div>
    <div class="scroll-area">
      <div class="section-title">Servers</div>
      <div id="serverList">
        <div class="msg-system">Login to see servers...</div>
      </div>
      
      <div id="channelSection" style="display:none">
        <div class="section-title">Channels</div>
        <div id="channelList"></div>
      </div>
      
      <div class="section-title">Actions</div>
      <div class="nav-item" onclick="$('inviteCodeInput').focus()">
        <span class="icon">+</span> <span>Join by Code</span>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="main-header">
      <h2 id="currentName">Welcome</h2>
      <div style="flex:1"></div>
      <div id="wsBadge" class="status-dot"></div>
      <span id="wsText" style="font-size:11px; color:var(--text-dim)">Offline</span>
    </div>
    
    <div class="chat-container">
      <div id="loadingMore">Loading history...</div>
      <div id="msgList">
        <div class="msg-system">Login and select a channel to start chatting.</div>
      </div>
      
      <div class="chat-input-area" id="chatInputArea">
        <div class="input-box">
          <textarea id="msgInput" placeholder="Message..." disabled
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
          <button id="btnSend" onclick="sendMsg()" disabled>Send</button>
        </div>
      </div>
      
      <div id="voiceControlArea" style="display:none; padding:16px; border-top:1px solid var(--border); text-align:center;">
        <button id="btnJoinVoice" class="btn btn-g" onclick="joinVoiceRoom()" style="width:auto; padding:8px 24px;">Join Voice Room</button>
        <button id="btnLeaveVoice" class="btn btn-r" onclick="leaveVoiceRoom()" style="display:none; width:auto; padding:8px 24px;">Leave Voice Room</button>
        
        <div id="localMicArea" style="display:none; margin-top:16px; background:#1f2328; padding:8px; border-radius:8px; border:1px solid var(--border);">
            <div style="font-size:10px; color:var(--text-dim); margin-bottom:4px;">🎤 My Microphone Level</div>
            <canvas id="localVu" width="200" height="15" style="background:#010409; border-radius:4px; display:block; margin:0 auto;"></canvas>
        </div>

        <div id="voiceMembers" style="margin-top:12px; display:flex; flex-direction:column; gap:8px; align-items:center;"></div>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="card" id="loginCard">
      <h3>Auth</h3>
      <input id="baseUrl" value="http://localhost:8080" placeholder="Base URL"/>
      <input id="email" value="demo@gmail.com" placeholder="Email"/>
      <input id="password" type="password" value="123456" placeholder="Password"/>
      <button class="btn btn-p" onclick="doLogin()">Login</button>
    </div>
    
    <div class="card" id="userCard" style="display:none">
      <h3>Account</h3>
      <div style="display:flex; align-items:center; gap:8px">
        <div id="authDot" class="status-dot"></div>
        <span id="authStatus" style="font-weight:600; font-size:12px">User</span>
      </div>
    </div>

    <div class="card">
      <h3>Join Server</h3>
      <input id="inviteCodeInput" placeholder="Invite code"/>
      <button class="btn btn-g" onclick="joinServerByCode()">Join</button>
    </div>

    <div class="card" id="memberCard" style="display:none">
      <h3>Members</h3>
      <div id="memberList"></div>
    </div>

    <div class="card">
      <h3>API Debug</h3>
      <div class="json-box" id="apiOut">{}</div>
      <div class="log-box" id="sysLog">Ready.</div>
    </div>
  </div>

</div>

<script>
const $ = id => document.getElementById(id);
let token = null, currentUser = null, stompClient = null;
let currentServerId = null, currentChannelId = null;
let historyPage = 0, isLoadingHistory = false, hasMoreHistory = true;
let localStream = null;
let peerConnections = {};
const ICE_SERVERS = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

// ─── AUTH & LOGOUT ────────────────────────────────────────────────────────────
async function doLogin() {
  const base = $('baseUrl').value.trim();
  const email = $('email').value.trim();
  const password = $('password').value;
  
  try {
    sysLog("Logging in...");
    const res = await api('POST', '/api/v1/auth/login', { email, password }, false);
    token = res.data.accessToken;
    currentUser = res.data.user;
    
    $('loginCard').style.display = 'none';
    $('userCard').style.display = 'block';
    $('btnLogout').style.display = 'block';
    
    $('authDot').className = 'status-dot on';
    $('authStatus').textContent = currentUser.username || currentUser.email;
    sysLog(`Login OK. Welcome ${currentUser.username || email}!`);
    
    await loadMyServers();
    connectWS();
  } catch (e) {
    sysLog("Login failed: " + e.message, "danger");
  }
}

function doLogout() {
  token = null; currentUser = null; currentServerId = null; currentChannelId = null;
  if (stompClient) stompClient.deactivate();
  $('loginCard').style.display = 'block';
  $('userCard').style.display = 'none';
  $('btnLogout').style.display = 'none';
  $('channelSection').style.display = 'none';
  $('memberCard').style.display = 'none';
  $('serverList').innerHTML = '<div class="msg-system">Login to see servers...</div>';
  $('msgList').innerHTML = '<div class="msg-system">Login and select a channel to start chatting.</div>';
  $('currentName').textContent = 'Welcome';
  $('msgInput').disabled = true;
  $('btnSend').disabled = true;
  $('wsBadge').className = 'status-dot';
  $('wsText').textContent = 'Offline';
  $('voiceControlArea').style.display = 'none';
  $('chatInputArea').style.display = 'block';
  if (activeVoiceEventSub) activeVoiceEventSub.unsubscribe();
  if (activeVoiceSignalSub) activeVoiceSignalSub.unsubscribe();
  if (activeVoiceRoomStateSub) activeVoiceRoomStateSub.unsubscribe();
  
  if (typeof stopMicrophone === 'function') stopMicrophone();
  if (typeof closePeerConnection === 'function') Object.keys(peerConnections).forEach(closePeerConnection);
  
  $('localMicArea').style.display = 'none';
  sysLog("Logged out.");
}

// ─── DATA LOADING ──────────────────────────────────────────────────────────────
async function loadMyServers() {
  try {
    const res = await api('GET', '/api/v1/servers/me');
    const servers = res.data || [];
    const list = $('serverList');
    list.innerHTML = '';
    servers.forEach(s => {
      const div = document.createElement('div');
      div.className = 'nav-item';
      div.innerHTML = `<span class="icon">${s.name[0]}</span> <span>${s.name}</span>`;
      div.onclick = () => selectServer(s.id, s.name);
      list.appendChild(div);
    });
    if (servers.length === 0) list.innerHTML = '<div class="msg-system">No servers joined.</div>';
  } catch (e) { sysLog("Load servers error: " + e.message); }
}

async function selectServer(id, name) {
  currentServerId = id;
  document.querySelectorAll('#serverList .nav-item').forEach(el => {
    el.classList.remove('active');
    if (el.textContent.trim().includes(name)) el.classList.add('active');
  });
  $('currentName').textContent = name;
  $('channelSection').style.display = 'block';
  $('memberCard').style.display = 'block';
  await loadChannels(id);
  await loadMembers(id);
  subscribePresence(id);
}

async function loadChannels(serverId) {
  try {
    const res = await api('GET', `/api/v1/servers/${serverId}/channels`);
    const channels = res.data || [];
    const list = $('channelList');
    list.innerHTML = '';
    channels.forEach(c => {
      const div = document.createElement('div');
      div.className = 'nav-item';
      const icon = c.type === 'VOICE' ? '🔊' : '#';
      div.innerHTML = `<span style="opacity:0.6; margin-right:4px">${icon}</span> <span>${c.name}</span>`;
      div.onclick = () => selectChannel(c.id, c.name, c.type);
      list.appendChild(div);
    });
  } catch (e) { sysLog("Load channels error: " + e.message); }
}

async function loadMembers(serverId) {
  try {
    const res = await api('GET', `/api/v1/servers/${serverId}/members`);
    const members = res.data || [];
    const list = $('memberList');
    list.innerHTML = '';
    members.forEach(m => {
      const div = document.createElement('div');
      div.className = 'member-item';
      div.setAttribute('data-uid', m.userId);
      div.innerHTML = `
        <div class="m-av">
          <div class="msg-av" style="width:20px;height:20px;font-size:9px">${m.displayName[0]}</div>
          <div class="p-dot ${m.online ? 'online' : ''}"></div>
        </div>
        <div style="flex:1">${m.displayName}</div>
        <div style="font-size:9px; color:var(--text-dim)">${m.role}</div>
      `;
      list.appendChild(div);
    });
  } catch (e) { sysLog("Load members error: " + e.message); }
}

function selectChannel(id, name, type) {
  currentChannelId = id;
  document.querySelectorAll('#channelList .nav-item').forEach(el => {
    el.classList.remove('active');
    if (el.textContent.trim().includes(name)) el.classList.add('active');
  });
  
  if (type === 'VOICE') {
      $('currentName').textContent = "🔊 " + name;
      $('chatInputArea').style.display = 'none';
      $('voiceControlArea').style.display = 'block';
      $('msgList').innerHTML = '<div class="msg-system">Voice channel selected. Click Join to connect.</div>';
      $('btnJoinVoice').style.display = 'inline-block';
      $('btnLeaveVoice').style.display = 'none';
      $('voiceMembers').innerHTML = '';
      if (activeChannelSub) { activeChannelSub.unsubscribe(); activeChannelSub = null; }
  } else {
      $('currentName').textContent = "# " + name;
      $('chatInputArea').style.display = 'block';
      $('voiceControlArea').style.display = 'none';
      $('msgInput').disabled = false;
      $('btnSend').disabled = false;
      $('msgList').innerHTML = '';
      historyPage = 0; hasMoreHistory = true;
      loadChatHistory(id, 0);
      subscribeChannel(id);
  }
}

// ─── CHAT & PAGINATION ────────────────────────────────────────────────────────
async function loadChatHistory(channelId, page) {
  if (isLoadingHistory || !hasMoreHistory) return;
  isLoadingHistory = true;
  if (page > 0) $('loadingMore').style.display = 'block';

  try {
    const res = await api('GET', `/api/v1/channels/${channelId}/messages?page=${page}&size=10`);
    const msgs = res.data.content || [];
    if (msgs.length < 10) hasMoreHistory = false;
    const list = $('msgList');
    const oldHeight = list.scrollHeight;
    msgs.forEach(m => renderMessage(m, true));
    if (page === 0) list.scrollTop = list.scrollHeight;
    else list.scrollTop = list.scrollHeight - oldHeight;
    historyPage++;
  } catch (e) { sysLog("History error: " + e.message); }
  isLoadingHistory = false;
  $('loadingMore').style.display = 'none';
}

$('msgList').onscroll = function() {
  if (this.scrollTop < 50 && !isLoadingHistory && hasMoreHistory && currentChannelId) {
    loadChatHistory(currentChannelId, historyPage);
  }
};

function renderMessage(m, prepend = false) {
  const list = $('msgList');
  const d = document.createElement('div');
  // FIX: sender object uses 'id' NOT 'userId'
  const isMe = currentUser && m.sender.id === currentUser.id;
  
  d.className = 'msg' + (isMe ? ' self' : '');
  const time = new Date(m.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  
  d.innerHTML = `
    <div class="msg-av">${(m.sender.displayName||'?')[0].toUpperCase()}</div>
    <div class="msg-body">
      <div class="msg-meta"><strong>${m.sender.displayName}</strong> ${time}</div>
      <div class="msg-content">${m.content}</div>
    </div>
  `;
  if (prepend) list.prepend(d);
  else {
    list.appendChild(d);
    list.scrollTop = list.scrollHeight;
  }
}

// ─── WEBSOCKET ────────────────────────────────────────────────────────────────
let activeChannelSub = null;
let activePresenceSub = null;
let activeVoiceEventSub = null;
let activeVoiceSignalSub = null;
let activeVoiceRoomStateSub = null;

function connectWS() {
  if (stompClient) stompClient.deactivate();
  stompClient = new StompJs.Client({
    webSocketFactory: () => new SockJS(`${$('baseUrl').value.trim()}/ws?token=${token}`)
  });
  stompClient.onConnect = () => {
    $('wsBadge').className = 'status-dot on';
    $('wsText').textContent = 'Connected';
    sysLog("WS Connected");
  };
  stompClient.onDisconnect = () => {
    $('wsBadge').className = 'status-dot';
    $('wsText').textContent = 'Disconnected';
  };
  stompClient.activate();
}

function subscribeChannel(id) {
  if (activeChannelSub) activeChannelSub.unsubscribe();
  activeChannelSub = stompClient.subscribe(`/topic/channels/${id}`, frame => {
    renderMessage(JSON.parse(frame.body));
  });
}

function subscribePresence(serverId) {
  if (activePresenceSub) activePresenceSub.unsubscribe();
  activePresenceSub = stompClient.subscribe(`/topic/servers/${serverId}/members`, frame => {
    const event = JSON.parse(frame.body);
    const el = document.querySelector(`[data-uid="${event.userId}"]`);
    if (el) {
      const dot = el.querySelector('.p-dot');
      dot.className = `p-dot ${event.status === 'ONLINE' ? 'online' : ''}`;
    }
  });
}

function sendMsg() {
  const content = $('msgInput').value.trim();
  if (!content || !currentChannelId) return;
  stompClient.publish({
    destination: `/app/channels/${currentChannelId}/send`,
    body: JSON.stringify({ content })
  });
  $('msgInput').value = '';
}

// ─── VOICE SIGNALING & WEBRTC ───────────────────────────────────────────────

let audioContext = null;
let activeAudioSources = []; // Prevent Chrome Garbage Collection bug

function visualizeAudio(stream, canvasElement) {
    if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
    if (audioContext.state === 'suspended') audioContext.resume();
    
    const source = audioContext.createMediaStreamSource(stream);
    activeAudioSources.push(source); // Keep reference
    
    const analyzer = audioContext.createAnalyser();
    analyzer.fftSize = 512;
    analyzer.smoothingTimeConstant = 0.4;
    source.connect(analyzer);
    
    const bufferLength = analyzer.fftSize;
    const dataArray = new Uint8Array(bufferLength);
    const ctx = canvasElement.getContext('2d');
    
    function draw() {
        if (!stream.active) return;
        requestAnimationFrame(draw);
        analyzer.getByteTimeDomainData(dataArray);
        
        // Calculate RMS (Root Mean Square) for volume
        let sum = 0;
        for(let i=0; i<bufferLength; i++) {
            let val = (dataArray[i] - 128) / 128.0;
            sum += val * val;
        }
        let rms = Math.sqrt(sum / bufferLength);
        
        // Boost visually
        let level = Math.min(rms * 5, 1); 
        
        ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        ctx.fillStyle = '#3fb950'; // Green color for level
        ctx.fillRect(0, 0, level * canvasElement.width, canvasElement.height);
    }
    draw();
}

async function getMicrophone() {
    if (localStream) return true;
    try {
        // Tắt echoCancellation để user dễ nghe thấy tiếng bị vòng lặp khi test 2 tab trên 1 máy tính
        localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false }, video: false });
        sysLog("Microphone accessed successfully.", "success");
        
        $('localMicArea').style.display = 'block';
        visualizeAudio(localStream, $('localVu'));
        
        return true;
    } catch (e) {
        sysLog("Microphone access denied: " + e.message, "danger");
        return false;
    }
}

function stopMicrophone() {
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
    }
    $('localMicArea').style.display = 'none';
}

async function joinVoiceRoom() {
    if (!currentChannelId || !stompClient) return;
    
    const hasMic = await getMicrophone();
    if (!hasMic) {
        sysLog("Cannot join voice without microphone.", "danger");
        return;
    }
    
    // Subscribe to voice room events
    if (activeVoiceEventSub) activeVoiceEventSub.unsubscribe();
    activeVoiceEventSub = stompClient.subscribe(`/topic/voice/${currentChannelId}/events`, async frame => {
        const ev = JSON.parse(frame.body);
        sysLog(`[Voice] ${ev.displayName || ev.userId} ${ev.type === 'JOIN' ? 'joined' : 'left'}`);
        if (ev.type === 'JOIN') {
            addVoiceMemberUI(ev.userId, ev.displayName);
            if (ev.userId !== currentUser.id) {
                // Someone joined, we should create an offer for them
                await createOffer(ev.userId);
            }
        } else {
            const el = document.getElementById(`v-member-${ev.userId}`);
            if (el) el.remove();
            closePeerConnection(ev.userId);
        }
    });

    // Subscribe to signaling P2P messages
    if (activeVoiceSignalSub) activeVoiceSignalSub.unsubscribe();
    activeVoiceSignalSub = stompClient.subscribe(`/user/queue/voice/signal`, async frame => {
        const sig = JSON.parse(frame.body);
        const { type, senderId, payload } = sig;
        sysLog(`[WebRTC] Received ${type} from ${senderId}`);
        
        if (type === 'OFFER') await handleOffer(senderId, payload);
        else if (type === 'ANSWER') await handleAnswer(senderId, payload);
        else if (type === 'ICE_CANDIDATE') await handleCandidate(senderId, payload);
    });

    // Subscribe to initial room state
    if (activeVoiceRoomStateSub) activeVoiceRoomStateSub.unsubscribe();
    activeVoiceRoomStateSub = stompClient.subscribe(`/user/queue/voice/room-state`, frame => {
        const state = JSON.parse(frame.body);
        sysLog(`[Voice] Room state: ${state.users.length} existing users`);
        $('voiceMembers').innerHTML = '';
        state.users.forEach(uid => addVoiceMemberUI(uid, uid.substring(0,6)));
    });

    // Send Join Message
    stompClient.publish({ destination: `/app/voice/${currentChannelId}/join`, body: "{}" });
    
    $('btnJoinVoice').style.display = 'none';
    $('btnLeaveVoice').style.display = 'inline-block';
    addVoiceMemberUI(currentUser.id, currentUser.displayName + " (Me)");
}

function leaveVoiceRoom() {
    if (!currentChannelId || !stompClient) return;
    stompClient.publish({ destination: `/app/voice/${currentChannelId}/leave`, body: "{}" });
    
    $('btnJoinVoice').style.display = 'inline-block';
    $('btnLeaveVoice').style.display = 'none';
    $('voiceMembers').innerHTML = '';
    
    if (activeVoiceEventSub) { activeVoiceEventSub.unsubscribe(); activeVoiceEventSub = null; }
    if (activeVoiceSignalSub) { activeVoiceSignalSub.unsubscribe(); activeVoiceSignalSub = null; }
    if (activeVoiceRoomStateSub) { activeVoiceRoomStateSub.unsubscribe(); activeVoiceRoomStateSub = null; }
    
    Object.keys(peerConnections).forEach(closePeerConnection);
    stopMicrophone();
}

function createPeerConnection(peerId) {
    if (peerConnections[peerId]) return peerConnections[peerId];
    
    const pc = new RTCPeerConnection(ICE_SERVERS);
    peerConnections[peerId] = pc;
    
    if (localStream) {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
    }
    
    pc.onicecandidate = event => {
        if (event.candidate) sendSignal(peerId, 'ICE_CANDIDATE', event.candidate);
    };
    
    pc.ontrack = event => {
        sysLog(`[WebRTC] Audio track received from ${peerId}`, "success");
        
        // Ensure UI exists before finding canvas
        addVoiceMemberUI(peerId, peerId.substring(0,6));
        
        let audio = document.getElementById(`audio-${peerId}`);
        if (!audio) {
            audio = document.createElement('audio');
            audio.id = `audio-${peerId}`;
            audio.autoplay = true;
            audio.controls = true;
            audio.style.marginTop = '10px';
            audio.style.width = '100%';
            audio.style.height = '30px';
            
            const memberDiv = document.getElementById(`v-member-${peerId}`);
            if (memberDiv) memberDiv.appendChild(audio);
            else $('voiceControlArea').appendChild(audio);
        }
        audio.srcObject = event.streams[0];
        
        // Visualize Remote Audio
        const memberDiv = document.getElementById(`v-member-${peerId}`);
        if (memberDiv) {
            let canvas = document.getElementById(`canvas-${peerId}`);
            if (!canvas) {
                canvas = document.createElement('canvas');
                canvas.id = `canvas-${peerId}`;
                canvas.width = 180;
                canvas.height = 15;
                canvas.style.cssText = "display:block; background:#010409; margin-top:8px; border-radius:4px;";
                memberDiv.insertBefore(canvas, audio);
            }
            visualizeAudio(event.streams[0], canvas);
        }

        // Attempt to play explicitly
        audio.play().catch(e => {
            sysLog(`[WebRTC] Audio autoplay blocked. Please click Play manually.`, "danger");
        });
    };
    
    return pc;
}

function closePeerConnection(peerId) {
    if (peerConnections[peerId]) {
        peerConnections[peerId].close();
        delete peerConnections[peerId];
    }
    const audio = document.getElementById(`audio-${peerId}`);
    if (audio) audio.remove();
}

function sendSignal(targetId, type, payload) {
    stompClient.publish({
        destination: `/app/voice/${currentChannelId}/signal`,
        body: JSON.stringify({ type, senderId: currentUser.id, targetId, payload })
    });
}

async function createOffer(peerId) {
    const pc = createPeerConnection(peerId);
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    sendSignal(peerId, 'OFFER', offer);
}

async function handleOffer(peerId, offer) {
    const pc = createPeerConnection(peerId);
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    sendSignal(peerId, 'ANSWER', answer);
}

async function handleAnswer(peerId, answer) {
    const pc = peerConnections[peerId];
    if (pc) await pc.setRemoteDescription(new RTCSessionDescription(answer));
}

async function handleCandidate(peerId, candidate) {
    const pc = peerConnections[peerId];
    if (pc) await pc.addIceCandidate(new RTCIceCandidate(candidate));
}

function addVoiceMemberUI(id, name) {
    if(document.getElementById(`v-member-${id}`)) return;
    const div = document.createElement('div');
    div.id = `v-member-${id}`;
    div.style.cssText = "background:#1f2328; border:1px solid var(--border); padding:12px; border-radius:8px; font-size:12px; font-weight:bold; display:flex; flex-direction:column; align-items:center; width:220px;";
    div.innerHTML = `<div>🎧 ${name || '?'}</div>`;
    $('voiceMembers').appendChild(div);
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
async function joinServerByCode() {
  const code = $('inviteCodeInput').value.trim();
  if (!code) return;
  try {
    const res = await api('POST', `/api/v1/invites/${code}/join`);
    sysLog("Joined server: " + res.data.name);
    await loadMyServers();
  } catch (e) { sysLog("Join error: " + e.message, "danger"); }
}

async function api(method, path, body = null, useAuth = true) {
  const base = $('baseUrl').value.trim();
  const headers = { 'Content-Type': 'application/json' };
  if (useAuth && token) headers['Authorization'] = `Bearer ${token}`;
  const options = { method, headers };
  if (body) options.body = JSON.stringify(body);
  const r = await fetch(base + path, options);
  const j = await r.json().catch(() => ({}));
  $('apiOut').textContent = JSON.stringify(j, null, 2);
  if (!r.ok) throw new Error(j.message || r.statusText);
  return j;
}

function sysLog(msg, type = "") {
  const log = $('sysLog');
  const t = new Date().toLocaleTimeString();
  log.innerHTML = `<div style="color:${type === 'danger' ? '#f85149' : 'inherit'}">[${t}] ${msg}</div>` + log.innerHTML;
}
</script>
