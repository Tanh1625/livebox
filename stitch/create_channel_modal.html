<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LiveBox - Create Channel</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-dim": "#5c9ffc",
                    "surface-container-highest": "#22262f",
                    "on-background": "#ecedf6",
                    "on-error": "#490006",
                    "inverse-primary": "#006976",
                    "background": "#0b0e14",
                    "tertiary-fixed-dim": "#65a4ff",
                    "surface-dim": "#0b0e14",
                    "surface-container-lowest": "#000000",
                    "outline": "#73757d",
                    "on-secondary-fixed": "#3b00a0",
                    "secondary-fixed-dim": "#cabaff",
                    "primary-fixed-dim": "#00d4ec",
                    "surface-bright": "#282c36",
                    "on-tertiary-fixed": "#001835",
                    "surface-container-high": "#1c2028",
                    "error-dim": "#d7383b",
                    "primary": "#81ecff",
                    "secondary-dim": "#7e51ff",
                    "secondary-container": "#591adc",
                    "on-tertiary-fixed-variant": "#003971",
                    "on-error-container": "#ffa8a3",
                    "surface": "#0b0e14",
                    "on-surface-variant": "#a9abb3",
                    "on-secondary-container": "#e4daff",
                    "tertiary-container": "#599cf9",
                    "outline-variant": "#45484f",
                    "error": "#ff716c",
                    "surface-container-low": "#10131a",
                    "primary-container": "#00e3fd",
                    "on-tertiary-container": "#001d3f",
                    "secondary-fixed": "#d8caff",
                    "inverse-on-surface": "#52555c",
                    "tertiary-fixed": "#80b2ff",
                    "on-primary": "#005762",
                    "on-secondary-fixed-variant": "#591bdc",
                    "inverse-surface": "#f9f9ff",
                    "on-primary-container": "#004d57",
                    "tertiary": "#70aaff",
                    "on-tertiary": "#002a55",
                    "on-primary-fixed-variant": "#005762",
                    "surface-tint": "#81ecff",
                    "on-primary-fixed": "#003840",
                    "on-secondary": "#25006b",
                    "surface-variant": "#22262f",
                    "on-surface": "#ecedf6",
                    "surface-container": "#161a21",
                    "error-container": "#9f0519",
                    "primary-fixed": "#00e3fd",
                    "secondary": "#a68cff",
                    "primary-dim": "#00d4ec"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "display": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Content Canvas (Simulated Background Content) -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none grid grid-cols-12 gap-6 p-12">
<div class="col-span-3 h-64 bg-surface-container-high rounded-lg"></div>
<div class="col-span-9 h-64 bg-surface-container-high rounded-lg"></div>
<div class="col-span-12 h-screen bg-surface-container rounded-lg"></div>
</div>
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-surface-dim/80 backdrop-blur-xl z-10"></div>
<!-- Modal Container -->
<div class="relative z-20 w-full max-w-[480px] bg-surface-container-low rounded-lg shadow-[0_16px_64px_-12px_rgba(0,229,255,0.15)] overflow-hidden flex flex-col">
<!-- Header -->
<div class="px-8 pt-8 pb-6 flex justify-between items-center">
<h1 class="text-2xl font-display font-extrabold tracking-tighter text-on-surface">Create Channel</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-bright hover:text-on-surface transition-colors duration-200 active:scale-90">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body -->
<div class="px-8 space-y-8 flex-grow">
<!-- Channel Type Section -->
<div class="space-y-4">
<label class="text-xs font-label font-bold uppercase tracking-[0.15em] text-on-surface-variant">Channel Type</label>
<div class="space-y-3">
<!-- Active Text Channel Card -->
<div class="relative group cursor-pointer">
<div class="absolute -inset-[1px] bg-gradient-to-r from-primary/50 to-secondary/50 rounded-lg blur opacity-25 group-hover:opacity-50 transition duration-300"></div>
<div class="relative bg-secondary-container p-5 rounded-lg flex items-center justify-between border-none transition-all duration-200">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-white/10 rounded-full">
<span class="material-symbols-outlined text-primary">tag</span>
</div>
<div>
<h3 class="font-display font-bold text-on-secondary-container">Text Channel</h3>
<p class="text-xs text-on-secondary-container/70 font-medium">Post images, GIFs, and stickers</p>
</div>
</div>
<div class="w-5 h-5 rounded-full bg-primary flex items-center justify-center">
<div class="w-2.5 h-2.5 rounded-full bg-on-primary"></div>
</div>
</div>
</div>
<!-- Inactive Voice Channel Card -->
<div class="bg-surface-container-highest p-5 rounded-lg flex items-center justify-between border-none hover:bg-surface-bright transition-all duration-200 cursor-pointer group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-surface-container rounded-full group-hover:bg-surface-container-high">
<span class="material-symbols-outlined text-on-surface-variant">volume_up</span>
</div>
<div>
<h3 class="font-display font-bold text-on-surface-variant">Voice Channel</h3>
<p class="text-xs text-on-surface-variant/60 font-medium">Hang out with voice, video, and screen share</p>
</div>
</div>
<div class="w-5 h-5 rounded-full border-2 border-outline-variant"></div>
</div>
</div>
</div>
<!-- Channel Name Section -->
<div class="space-y-4">
<label class="text-xs font-label font-bold uppercase tracking-[0.15em] text-on-surface-variant">Channel Name</label>
<div class="relative group">
<div class="absolute left-4 top-1/2 -translate-y-1/2 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary drop-shadow-[0_0_8px_rgba(129,236,255,0.6)]">tag</span>
</div>
<input class="w-full bg-surface-container-high border-none text-on-surface placeholder:text-outline py-4 pl-12 pr-6 rounded-md focus:ring-0 focus:bg-surface-bright transition-all duration-300 font-medium text-lg" placeholder="new-channel" type="text"/>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary group-focus-within:w-full transition-all duration-500"></div>
</div>
</div>
</div>
<!-- Footer -->
<div class="px-8 py-8 flex items-center justify-end gap-6 mt-4">
<button class="text-on-surface-variant font-display font-bold hover:text-on-surface transition-colors active:scale-95 duration-200">
                Cancel
            </button>
<button class="bg-primary text-on-primary px-8 py-3.5 rounded-xl font-display font-black text-sm uppercase tracking-widest shadow-[0_8px_24px_-4px_rgba(0,227,253,0.3)] hover:shadow-[0_12px_32px_-4px_rgba(0,227,253,0.5)] active:scale-95 transition-all duration-200">
                Create Channel
            </button>
</div>
</div>
<!-- Decorative Glow Elements -->
<div class="fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-secondary/10 blur-[100px] rounded-full pointer-events-none"></div>
</body></html>
